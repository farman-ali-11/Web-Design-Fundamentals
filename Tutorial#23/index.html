<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Diplay Property - CSS</title>
    <style>
        .box{
            border: 2px solid firebrick;
            margin: 45px;
            padding: 34px;
            width: 300px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>
    <span class="box">
        I am another box
    </span>
</body>
</html>
