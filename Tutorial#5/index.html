<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img height="200" src="image.jpg" alt="Bird Image">

    <table>
        <caption>Employee Detail</caption>
        <thead>

            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
            </tr>
        </thead>
        <tbody>

            <tr>
                <td>Farman</td>
                <td>22</td>
                <td>Male</td>
            </tr>
            <tr>
                <td colspan="2">Kamran</td>
                <td rowspan="2">Male</td>
            </tr>
            
            <tr>
                <td>Kashif</td>
                <td>20</td>
            </tr>
        </tbody>
    </tfoot>
    <tr>
        <td>Ahmed</td>
        <td>23</td>
        <td>Male</td>
    </tr>
    <tfoot>
        </table>
        <h3>Unordered Person List

            <ul type="square">
                <li>Farman</li>
                <li>Kamran</li>
                <li>Kashif</li>
            </ul>
        </h3>
        <h4>Ordered Person List
            <ol type="I">
                <li>Farman</li>
                <li>Kamran</li>
                <li>Kashif</li>
            </ol>
        </h4>
</body>
</html>
