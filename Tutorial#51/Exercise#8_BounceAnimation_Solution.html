<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Animation - CSS</title>
    <style>
        .container{
            width: 90vw;
            height: 80vh;
            background-color: bisque;
            position: relative;
        }
        .box{
            width: 70px;
            height: 70px;
            background-color: aquamarine;
            position: absolute;
            left: 0;
            bottom: 0;
            border-radius: 70px;
            animation: boxAnimationX 3s linear infinite,
                       boxAnimationY 1s ease-out infinite alternate;
        }
        @keyframes boxAnimationX{
            from{
                left: 0;
            }
            to{
                left: 1100px;
            }           
        }
        @keyframes boxAnimationY{
            from{
                bottom: 0;
            }
            to{
                bottom: 320px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
