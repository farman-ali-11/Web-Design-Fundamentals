<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Sizing Units - CSS</title>
    <style>
        body{
            background-color: rgb(81, 222, 222);
        }
        .container{
            display: flex;
            justify-content: center;
            /* align-items: center; */
        }

        .loginform{
            background-color: white;
            width: 300px;
            border-radius: 10px;
            padding: 30px;
        }
        .bt{
            background-color: rgb(33, 134, 197);
            margin-left: 44%;
            text-align: center;
            border: 1px solid black;
            width: 6vw;
            height: 5vh;
            border-radius: 6px;
        }
       
    </style>
</head>
<body>
<div class="container">
        <form action="post" class="loginform">
        <h1>Please Login</h1>
    
            <div class="input-group">
                <label for="email">Email</label>
            <input type="box"  placeholder="Enter email">
            <input type="password" placeholder="Enter password">
            </div>
            <button class="bt">Sign in</button>
            <p> dont have an account <a href="">signup</a></p>
        </div>
    </form>
</div>
</body>
</html>
