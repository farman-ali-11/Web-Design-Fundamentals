<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Properties - CSS</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .box{
            margin: 3px;
            padding: 3px;
            width: 80vw;
            height:400px ;
            border: 2px solid purple;
            /* position: relative; */
        }
        .box1{
            background-color: aqua;
            /* position: absolute; */
            top: 0px;
            left: 3px;
            position: sticky;
            /* top: 0px; */
            /* left: 30px; */
            /* width: 80vw; */
            /* height: 111px; */
            /* margin: 0px; */
            /* padding: 0px; */
        }
        .box2{
            background-color:chocolate ;
            /* position: absolute; */
        }
        .box3{
            background-color: blueviolet;
            /* position: fixed; */
        }
        .box4{
            background-color: darkgreen;
        }
        .parent{
            border: 3px solid red;
            margin: 45px;
            padding: 34px;
            /* position: relative; */
            /* transform: translate(0); */
            /* filter: invert(0); */
            perspective: 0em;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
