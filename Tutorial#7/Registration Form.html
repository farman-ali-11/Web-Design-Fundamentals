<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Portal - Farman Rajper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Apply for Registration</h1>
    <form action="post">

        <div>
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
        </div>

            <div>
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="Enter your email" autofocus>
            </div>

        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <select name="cities">
                <option value="karachi">Karachi</option>
                <option value="sukkur">Sukkur</option>
                <option value="kashmore">Kashmore</option>
                <option value="kandhkot">Kandhkot</option>
                <option value="khairpur mir's">Khaipur Mir's</option>
            </select>
        </div>
        <div>
            <input type="checkbox" id="agree" name="agree" value="yes">
            <label for="agree">Are you agree with terms and conditions</label>
        </div>
        <div>
            <label for="description">Description</label>
            <br>
            <textarea id="description" name="description" rows="4" cols="50"></textarea>
        </div>

    </form>
    <script src="script.js"></script>
</body>
</html>
