<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - HTML&CSS</title>
    <style>
        span{
            background-color: aqua;
        }
        #email{
            text-align: center;
        }
        #pass{
            text-align: center;
        }
        .bt{
            text-align: center;
        }
    </style>
</head>
<body>
    <span>
        <h1>Login</h1>
        <p>
            <input type="text" id="email" name="email" placeholder="Enter your email">
            <input type="password" id="pass" name="password" placeholder="Enter your password">
        </p>
        <p>
            <button class="bt">Login</button>
            <button class="bt">Signup</button>
        </p>
    </span>
</body>
</html>
