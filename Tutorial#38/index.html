<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox - CSS</title>
    <style>
        .container{
            border: 2px solid red;
            height: 60vh;
            display: flex;
            /* justify-content: center; */
            align-items: center;
            flex-direction: row;
            flex-wrap: wrap;
            align-content: flex-start;
            flex-flow: row wrap;
            gap: 30px 10px;
            
        }
        .item{
            width: 40px;
            height: 40px;
            background-color: blueviolet;
            border: 2px solid black;
            margin: 4px;
        }
        .order-1{
            /* order: 3; */
            
        }
        .order-2{
            /* order: 4; */
        }
        .order-3{
            /* order: 2; */
        }
        .item{
            flex-grow: 1;
        }
        .item1{
            /* flex-grow: 5; */
            flex-shrink: 2;
        }
    </style>
</head>
<body>
    <main>
        <nav class="container">
            <div class="item item1 order-1">1</div>
            <div class="item item2 roder-2">2</div>
            <div class="item order-3">3</div>
            <div class="item">4</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </nav>
    </main>
</body>
</html>
